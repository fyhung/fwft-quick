        // Simple Regex-based Syntax Highlighter to avoid external libraries
        function highlightSyntax(code) {
            if(!code) return '';
            // Escape HTML brackets first
            let html = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Comments (#)
            html = html.replace(/(#.*)/g, '<span class="token-comment">$1</span>');
            // Strings ("..." or '...')
            html = html.replace(/("[^"]*")/g, '<span class="token-string">$1</span>');
            html = html.replace(/('[^']*')/g, '<span class="token-string">$1</span>');
            // Keywords
            const keywords = ['print', 'input', 'if', 'else', 'elif', 'while', 'for', 'in', 'break', 'and', 'or', 'not', 'len', 'int'];
            const regexK = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g');
            // Make sure we don't highlight keywords inside strings/comments (Simplified approach: works mostly for standard examples)
            html = html.replace(regexK, '<span class="token-keyword">$1</span>');
            // Booleans
            html = html.replace(/\b(True|False)\b/g, '<span class="token-boolean">$1</span>');
            // Numbers
            html = html.replace(/\b(\d+(\.\d+)?)\b/g, '<span class="token-number">$1</span>');
            
            return html;
        }

            courseData.forEach(module => {

                btn.className = `w-full text-left px-4 py-3 rounded-lg mb-1 transition-colors text-sm font-medium ${currentModuleId === module.id ? 'bg-stone-800 text-white' : 'text-stone-400 hover:bg-stone-800 hover:text-stone-200'}`;
                btn.innerText = module.title;
                btn.onclick = () => {
                    currentModuleId = module.id;
                    renderModule();
                    renderNavigation();
                    if(window.innerWidth < 768) {
                        sidebar.classList.add('-translate-x-full'); // Close on mobile click
                    }
                };
                navContainer.appendChild(btn);
            });
        }

        // HTML/CSS Visual Generators (No SVG/Mermaid)
        function getVisualizerHTML(visualKey) {
            switch(visualKey) {
                case 'array_boxes':
                    return `
                        <div class="flex flex-col items-center mt-4 p-4 bg-stone-100 rounded-lg">
                            <p class="text-sm text-stone-500 mb-2 font-bold">List: fruits = ["蘋果", "香蕉", "橘子"]</p>
                            <div class="flex gap-2">
                                <div class="flex flex-col items-center"><div class="text-xs text-stone-400 mb-1">Index 0</div><div class="w-16 h-16 bg-white border-2 border-stone-300 rounded shadow flex items-center justify-center font-bold text-stone-700">蘋果</div></div>
                                <div class="flex flex-col items-center"><div class="text-xs text-stone-400 mb-1">Index 1</div><div class="w-16 h-16 bg-white border-2 border-stone-300 rounded shadow flex items-center justify-center font-bold text-stone-700">香蕉</div></div>
                                <div class="flex flex-col items-center"><div class="text-xs text-stone-400 mb-1">Index 2</div><div class="w-16 h-16 bg-white border-2 border-stone-300 rounded shadow flex items-center justify-center font-bold text-stone-700">橘子</div></div>
                            </div>
                        </div>`;
                case 'swap_cups':
                    return `
                        <div class="flex flex-col items-center mt-4 p-4 bg-stone-100 rounded-lg">
                            <p class="text-sm text-stone-500 mb-4 font-bold">變數交換步驟 (Temp = a, a = b, b = Temp)</p>
                            <div class="flex gap-6 items-end">
                                <div class="flex flex-col items-center"><div class="w-12 h-16 border-b-2 border-l-2 border-r-2 border-stone-400 rounded-b flex items-end justify-center pb-2 bg-red-100 text-red-700 font-bold">香蕉</div><div class="mt-2 text-sm font-bold">變數 a</div></div>
                                <div class="flex flex-col items-center"><div class="text-2xl text-stone-400 mb-4">⇄</div></div>
                                <div class="flex flex-col items-center"><div class="w-12 h-16 border-b-2 border-l-2 border-r-2 border-stone-400 rounded-b flex items-end justify-center pb-2 bg-yellow-100 text-yellow-700 font-bold">蘋果</div><div class="mt-2 text-sm font-bold">變數 b</div></div>
                                <div class="w-px h-16 bg-stone-300 mx-2"></div>
                                <div class="flex flex-col items-center"><div class="w-12 h-16 border-b-2 border-l-2 border-r-2 border-stone-400 rounded-b border-dashed flex items-end justify-center pb-2">空</div><div class="mt-2 text-sm text-stone-500">Temp</div></div>
                            </div>
                        </div>`;
                case 'logic_gates':
                     return `
                        <div class="flex flex-col items-center mt-4 p-4 bg-stone-100 rounded-lg w-full max-w-md mx-auto">
                            <div class="flex justify-between w-full mb-2 border-b border-stone-300 pb-2">
                                <div class="text-center w-1/3 font-bold text-sm">A</div>
                                <div class="text-center w-1/3 font-bold text-sm">B</div>
                                <div class="text-center w-1/3 font-bold text-sm text-blue-600">A and B</div>
                            </div>
                            <div class="flex justify-between w-full mb-1"><div class="text-center w-1/3 text-sm text-green-600">True</div><div class="text-center w-1/3 text-sm text-green-600">True</div><div class="text-center w-1/3 text-sm font-bold text-green-600 bg-green-100 rounded">True</div></div>
                            <div class="flex justify-between w-full mb-1"><div class="text-center w-1/3 text-sm text-green-600">True</div><div class="text-center w-1/3 text-sm text-red-500">False</div><div class="text-center w-1/3 text-sm font-bold text-red-500 bg-red-100 rounded">False</div></div>
                        </div>`;
                case 'binary_search':
                    return `
                        <div class="flex flex-col mt-4 p-4 bg-stone-100 rounded-lg overflow-x-auto">
                            <p class="text-sm text-stone-500 mb-2 font-bold">找目標 60 (直接切中間)</p>
                            <div class="flex gap-1 opacity-50"><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">10</div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">20</div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">30</div><div class="w-8 h-8 bg-blue-300 flex items-center justify-center text-xs font-bold ring-2 ring-blue-500">40</div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">50</div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">60</div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">70</div></div>
                            <p class="text-xs text-stone-500 mt-1 mb-2">中間是 40，60 比 40 大，所以左半邊(包含40)直接拋棄！</p>
                            <div class="flex gap-1"><div class="w-8 h-8 bg-transparent flex items-center justify-center text-xs"></div><div class="w-8 h-8 bg-transparent flex items-center justify-center text-xs"></div><div class="w-8 h-8 bg-transparent flex items-center justify-center text-xs"></div><div class="w-8 h-8 bg-transparent flex items-center justify-center text-xs"></div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">50</div><div class="w-8 h-8 bg-green-300 flex items-center justify-center text-xs font-bold ring-2 ring-green-500">60</div><div class="w-8 h-8 bg-stone-300 flex items-center justify-center text-xs">70</div></div>
                            <p class="text-xs text-stone-500 mt-1">剩下的找中間，直接命中 60！</p>
                        </div>`;
                default:
                    return ''; // No visual for this module
            }
        }

        // Render Current Module Content
        function renderModule() {
            const module = courseData.find(m => m.id === currentModuleId);
            if(!module) return;

            // Destroy previous chart if it exists
            if(chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }

            // Introduction Context Paragraph (Required by prompt)
            let introContext = `<p class="text-stone-600 mb-6 leading-relaxed">
                <span class="font-bold text-stone-800">本節目標：</span> 
                這部分內容來自源文件的 <span class="bg-stone-200 px-1 rounded text-sm text-stone-700">${module.title}</span> 章節。
                在這裡，我們將透過互動式編輯器與圖解，幫助你理解該語法的實際運作邏輯，為後續更複雜的程式架構打下基礎。
            </p>`;

            if (module.isOverview) {
                // Render Landing Page / Dashboard Overview
                contentArea.innerHTML = `
                    <div class="max-w-4xl mx-auto fade-in">
                        <h2 class="text-3xl font-bold text-stone-800 mb-2">${module.title}</h2>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 mb-8 mt-6">
                            <h3 class="text-xl font-bold text-stone-800 mb-4">為什麼我們要學程式語言？</h3>
                            <p class="text-stone-600 leading-relaxed mb-4">${module.concept}</p>
                            
                            <div class="bg-stone-50 p-4 rounded-lg border border-stone-200 mt-6">
                                <h4 class="font-bold text-stone-700 mb-2 flex items-center gap-2">📊 演算法效能比較：線性搜尋 vs 二元搜尋</h4>
                                <p class="text-sm text-stone-500 mb-4">當資料量越來越大時，好的演算法（二元搜尋）尋找資料的次數會遠低於土法煉鋼的線性搜尋。這也是為何我們要循序漸進學習各種語法與邏輯。</p>
                                
                                <!-- CRITICAL: Chart Container styled correctly -->
                                <div class="chart-container">
                                    <canvas id="complexityChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                                <h4 class="font-bold text-blue-800 mb-2">💡 如何使用本教學？</h4>
                                <ul class="list-disc pl-5 text-sm text-blue-700 space-y-2">
                                    <li>使用左側選單切換不同的學習單元。</li>
                                    <li>閱讀概念後，點擊「▶ 執行程式碼」查看結果。</li>
                                    <li>查看視覺化圖解以加深記憶。</li>
                                    <li>利用隨堂練習測試自己的理解度。</li>
                                </ul>
                            </div>
                            <div class="bg-stone-800 p-6 rounded-xl border border-stone-700 text-stone-300 flex items-center justify-center flex-col text-center hover:bg-stone-700 transition cursor-pointer" onclick="document.querySelector('#nav-container button:nth-child(2)').click()">
                                <span class="text-4xl mb-2">🚀</span>
                                <span class="font-bold text-white">點此開始第一章：print()</span>
                            </div>
                        </div>
                    </div>
                `;
                
                // Initialize Chart.js for the Overview
                setTimeout(initComplexityChart, 100);
                return;
            }

            // Normal Module Render
            let visualHtml = getVisualizerHTML(module.visual);

            contentArea.innerHTML = `
                <div class="max-w-4xl mx-auto fade-in">
                    <h2 class="text-2xl md:text-3xl font-bold text-stone-800 mb-4">${module.title}</h2>
                    ${introContext}
                    
                    <!-- Concept Block -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 mb-6">
                        <h3 class="text-lg font-bold text-stone-800 mb-2 flex items-center gap-2">📌 觀念導引</h3>
                        <p class="text-stone-600 leading-relaxed">${module.concept}</p>
                        ${visualHtml}
                    </div>

                    <!-- Code IDE Simulator Block -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                        <div class="bg-[#1c1917] rounded-xl shadow-lg border border-stone-800 flex flex-col overflow-hidden">
                            <div class="bg-[#292524] px-4 py-2 flex justify-between items-center border-b border-stone-700">
                                <span class="text-xs text-stone-400 font-code">main.py</span>
                                <button onclick="runCode()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1 rounded transition flex items-center gap-1 font-bold">
                                    ▶ 執行程式碼
                                </button>
                            </div>
                            <div class="p-4 overflow-x-auto custom-scrollbar flex-1">
                                <pre class="text-sm font-code text-stone-300 leading-relaxed m-0 whitespace-pre-wrap"><code>${highlightSyntax(module.code)}</code></pre>
                            </div>
                        </div>

                        <!-- Output Console -->
                        <div class="bg-[#0c0a09] rounded-xl shadow-lg border border-stone-800 flex flex-col overflow-hidden relative group">
                            <div class="bg-[#1c1917] px-4 py-2 flex items-center border-b border-stone-800">
                                <span class="text-xs text-stone-500 font-code">Console Output</span>
                            </div>
                            <div class="p-4 flex-1 relative">
                                <!-- Waiting state -->
                                <div id="console-waiting" class="absolute inset-0 flex items-center justify-center flex-col text-stone-600">
                                    <span class="text-2xl mb-2">⌨️</span>
                                    <span class="text-sm">點擊左側「執行程式碼」查看結果</span>
                                </div>
                                <!-- Result state (Hidden initially) -->
                                <pre id="console-output" class="text-sm font-code text-green-400 whitespace-pre-wrap hidden m-0"></pre>
                            </div>
                        </div>
                    </div>

                    <!-- Tips / Warnings -->
                    ${module.tip ? `
                        <div class="${module.tipType.includes('錯誤') ? 'bg-red-50 border-red-200 text-red-800' : 'bg-yellow-50 border-yellow-200 text-yellow-800'} border p-4 rounded-lg mb-6 text-sm flex gap-3 items-start">
                            <div class="font-bold flex-shrink-0">${module.tipType}</div>
                            <div>${module.tip}</div>
                        </div>
                    ` : ''}

                    <!-- Practice Quiz -->
                    ${module.practice ? `
                        <div class="bg-white border-2 border-dashed border-stone-300 p-6 rounded-xl mb-10">
                            <h3 class="text-md font-bold text-stone-700 mb-2 flex items-center gap-2">📝 隨堂練習題</h3>
                            <p class="text-stone-600 text-sm mb-4">${module.practice}</p>
                            <button onclick="toggleAnswer(this)" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition">👉 點此思考後看提示</button>
                            <div class="answer-box hidden mt-3 p-3 bg-blue-50 text-blue-800 text-sm rounded border border-blue-100">
                                試著在電腦上開啟 Python 編輯器，把剛剛學到的語法組合看看！程式碼就像拼圖，動手寫是學會的唯一途徑喔。
                            </div>
                        </div>
                    ` : ''}
                    
                    <!-- Bottom Navigation -->
                    <div class="flex justify-between items-center border-t border-stone-200 pt-6 mt-4 pb-12">
                        ${currentModuleId > 0 ? `<button onclick="goToModule(${currentModuleId - 1})" class="text-stone-500 hover:text-stone-800 font-bold text-sm transition">← 上一單元</button>` : '<div></div>'}
                        ${currentModuleId < courseData.length - 1 ? `<button onclick="goToModule(${currentModuleId + 1})" class="bg-stone-800 hover:bg-stone-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition shadow">下一單元 →</button>` : '<div></div>'}
                    </div>
                </div>
            `;
        }

        // --- Interaction Handlers ---

        function runCode() {
            const module = courseData.find(m => m.id === currentModuleId);
            const waitingDiv = document.getElementById('console-waiting');
            const outputPre = document.getElementById('console-output');
            
            if(waitingDiv && outputPre && module) {
                waitingDiv.classList.add('hidden');
                outputPre.classList.remove('hidden');
                outputPre.classList.add('fade-in');
                outputPre.innerText = module.output; // Display pre-defined output
            }
        }

        function toggleAnswer(btn) {
            const answerBox = btn.nextElementSibling;
            if(answerBox.classList.contains('hidden')) {
                answerBox.classList.remove('hidden');
                btn.innerText = "👇 隱藏提示";
            } else {
                answerBox.classList.add('hidden');
                btn.innerText = "👉 點此思考後看提示";
            }
        }

        function goToModule(id) {
            currentModuleId = id;
            renderModule();
            renderNavigation();
            contentArea.scrollTo(0,0);
        }

        // --- Chart.js Visualization (Dashboard Overview) ---
        function initComplexityChart() {
            const ctx = document.getElementById('complexityChart');
            if(!ctx) return;

            // Generate mock data for O(N) vs O(log N)
            const labels = [10, 50, 100, 200, 500, 1000];
            const linearData = labels.map(n => n); // worst case O(N)
            const binaryData = labels.map(n => Math.ceil(Math.log2(n))); // worst case O(log N)

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '線性搜尋 (逐一尋找) 步驟數',
                            data: linearData,
                            borderColor: '#ef4444', // Red
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            borderWidth: 2,
                            tension: 0.1,
                            fill: true
                        },
                        {
                            label: '二元搜尋 (對半切) 步驟數',
                            data: binaryData,
                            borderColor: '#22c55e', // Green
                            backgroundColor: 'rgba(34, 197, 94, 0.2)',
                            borderWidth: 3,
                            tension: 0.1,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // CRITICAL for filling parent container properly
                    plugins: {
                        legend: { position: 'top', labels: { font: { family: "'Noto Sans TC', sans-serif" } } },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            titleFont: { family: "'Noto Sans TC', sans-serif" },
                            bodyFont: { family: "'Noto Sans TC', sans-serif" }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: '資料總筆數 (N)', font: { family: "'Noto Sans TC', sans-serif" } }
                        },
                        y: {
                            title: { display: true, text: '最差情況尋找次數', font: { family: "'Noto Sans TC', sans-serif" } },
                            type: 'logarithmic' // Log scale makes the massive difference easier to see visually
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // --- Event Listeners for Mobile Sidebar ---
        openSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });
        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderNavigation();
            renderModule();
        });

    </script>
</body>
</html>
