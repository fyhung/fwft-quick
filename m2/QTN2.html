<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prisoner 14/4 1610 Dilemma Multiplayer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (Compiles JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Custom scrollbar for leaderboard */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 1); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans selection:bg-blue-500/30">
  
  <div id="root"></div>

  <!-- Application Logic -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getDatabase, ref, set, update, onValue } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js';

    // Extract React Hooks from the global React object
    const { useState, useEffect, useRef, useMemo } = React;

    // ---------------------------------------------------------
    // FIREBASE CONFIGURATION & INITIALIZATION
    // ---------------------------------------------------------
    const userProvidedConfig = {
      apiKey: "AIzaSyAR7Tjp8k8dHybMWpmx-MfaV9Ziyl3eADc",
      authDomain: "fwft-quickchat.firebaseapp.com",
      projectId: "fwft-quickchat",
      storageBucket: "fwft-quickchat.firebasestorage.app",
      messagingSenderId: "27728669602",
      appId: "1:27728669602:web:674bfa6cbb66320985e0fb",
      measurementId: "G-ZRRG2BM00F"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userProvidedConfig;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'github-deployment-id';

    const getRoomsPath = () => `artifacts/${appId}/public/data/rooms`;
    const getPlayersPath = () => `artifacts/${appId}/public/data/players`;

    // ---------------------------------------------------------
    // MAIN APPLICATION COMPONENT
    // ---------------------------------------------------------
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('landing'); 
      const [roomId, setRoomId] = useState('');
      const [room, setRoom] = useState(null);
      const [players, setPlayers] = useState([]);
      const [errorMsg, setErrorMsg] = useState('');
      const [isHosting, setIsHosting] = useState(false);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) {
          setRoomId(roomParam.toUpperCase());
          setView('student-login');
        }
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Authentication Error:", error);
            setErrorMsg("Failed to connect to game servers. Please check Firebase rules.");
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;

        const roomsRef = ref(db, getRoomsPath());
        const unsubRooms = onValue(roomsRef, (snapshot) => {
          const data = snapshot.val() || {};
          const allRooms = Object.keys(data).map(key => ({ id: key, ...data[key] }));
          const currentRoom = allRooms.find(r => r.id === roomId);
          if (currentRoom) setRoom(currentRoom);
        }, (error) => console.error(error));

        const playersRef = ref(db, getPlayersPath());
        const unsubPlayers = onValue(playersRef, (snapshot) => {
          const data = snapshot.val() || {};
          const allPlayers = Object.keys(data).map(key => ({ id: key, ...data[key] }));
          const roomPlayers = allPlayers.filter(p => p.roomId === roomId);
          setPlayers(roomPlayers);
        }, (error) => console.error(error));

        return () => {
          unsubRooms();
          unsubPlayers();
        };
      }, [user, roomId]);

      const joinAsTeacher = async () => {
        if (!user) return;
        setIsHosting(true);
        const newRoomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        setRoomId(newRoomId);
        
        try {
          const createRoomPromise = set(ref(db, `${getRoomsPath()}/${newRoomId}`), {
            status: 'lobby',
            hostId: user.uid,
            createdAt: new Date().toISOString(),
            settings: { avatarsPerStudent: 1, numAngels: 0, numDevils: 0, allowSelfCollision: false, enableMemory: false, allowTFT: true }
          });

          // Timeout to prevent silent hanging if Realtime Database is not enabled in Firebase Console
          const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error("Connection timeout: Please ensure Realtime Database is fully enabled in your Firebase Console.")), 6000)
          );

          await Promise.race([createRoomPromise, timeoutPromise]);
          setView('teacher-lobby');
        } catch (e) {
          console.error("Hosting error:", e);
          setErrorMsg(e.message || "Error creating room. Check Firebase database read/write rules.");
        } finally {
          setIsHosting(false);
        }
      };

      const getJoinUrl = () => {
        const baseUrl = window.location.origin + window.location.pathname;
        return `${baseUrl}?room=${roomId}`;
      };

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-sans">
            <div className="animate-pulse text-2xl font-bold text-blue-400">Connecting to Simulation Engine...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 font-sans selection:bg-blue-500/30">
          {errorMsg && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-3 backdrop-blur-sm z-[100]">
              <span className="font-bold">Error:</span> {errorMsg}
              <button onClick={() => setErrorMsg('')} className="ml-2 hover:bg-white/20 p-1 rounded-full px-2">✕</button>
            </div>
          )}

          {view === 'landing' && <LandingView onHost={joinAsTeacher} onJoin={() => setView('student-login')} isHosting={isHosting} />}
          {view === 'teacher-lobby' && <TeacherLobby roomId={roomId} playersCount={players.length} joinUrl={getJoinUrl()} onPlay={async (settings) => { await update(ref(db, `${getRoomsPath()}/${roomId}`), { status: 'playing', settings }); setView('teacher-arena'); }} />}
          {view === 'teacher-arena' && <TeacherArena roomId={roomId} room={room} players={players} onStop={async () => { await update(ref(db, `${getRoomsPath()}/${roomId}`), { status: 'stopped' }); setView('teacher-lobby'); }} />}
          {view === 'student-login' && <StudentLogin roomId={roomId} setRoomId={setRoomId} userId={user.uid} onJoined={() => setView('student-strategy')} setErrorMsg={setErrorMsg} />}
          {view === 'student-strategy' && <StudentStrategy userId={user.uid} roomId={roomId} roomStatus={room?.status} roomSettings={room?.settings} player={players.find(p => p.id === user.uid)} setErrorMsg={setErrorMsg} />}
        </div>
      );
    }

    // ---------------------------------------------------------
    // LANDING PAGE
    // ---------------------------------------------------------
    function LandingView({ onHost, onJoin, isHosting }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-950">
          <div className="bg-slate-800/50 p-10 rounded-3xl shadow-2xl border border-slate-700/50 backdrop-blur-md max-w-lg w-full text-center">
            <div className="text-6xl mb-6">🤝🔪</div>
            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4 drop-shadow-sm">
              Prisoner's Dilemma
            </h1>
            <p className="text-slate-400 mb-10 text-lg">A multiplayer behavioral economics simulation.</p>
            <div className="space-y-4">
              <button onClick={onHost} disabled={isHosting} className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-2xl font-bold text-xl shadow-lg transition-all active:scale-95 border border-blue-500/30 disabled:opacity-50">
                {isHosting ? '⏳ Creating Room...' : '👨‍🏫 Host Game (Teacher)'}
              </button>
              <div className="relative flex py-2 items-center">
                <div className="flex-grow border-t border-slate-600"></div>
                <span className="flex-shrink-0 mx-4 text-slate-500">OR</span>
                <div className="flex-grow border-t border-slate-600"></div>
              </div>
              <button onClick={onJoin} className="w-full py-4 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold text-xl shadow-lg transition-all active:scale-95 border border-slate-500/30">
                🧑‍🎓 Join Game (Student)
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ---------------------------------------------------------
    // TEACHER VIEWS
    // ---------------------------------------------------------
    function TeacherLobby({ roomId, playersCount, joinUrl, onPlay }) {
      const [avatarsPerStudent, setAvatarsPerStudent] = useState(1);
      const [numAngels, setNumAngels] = useState(0);
      const [numDevils, setNumDevils] = useState(0);
      const [allowSelfCollision, setAllowSelfCollision] = useState(false);
      const [enableMemory, setEnableMemory] = useState(false);
      const [allowTFT, setAllowTFT] = useState(true);

      // Sync settings to Firebase in real-time while in the lobby so students see UI changes immediately
      useEffect(() => {
        if (!roomId) return;
        update(ref(db, `${getRoomsPath()}/${roomId}/settings`), {
          avatarsPerStudent, numAngels, numDevils, allowSelfCollision, enableMemory, allowTFT
        }).catch(err => console.error("Failed to sync live settings:", err));
      }, [avatarsPerStudent, numAngels, numDevils, allowSelfCollision, enableMemory, allowTFT, roomId]);

      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(joinUrl)}&bgcolor=1e293b&color=38bdf8`;
      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6">
          <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-2xl text-center">
            <h2 className="text-3xl font-bold mb-2">Game Lobby</h2>
            <p className="text-slate-400 mb-8">Tell your students to scan the QR code or enter the Room Code.</p>
            <div className="flex flex-col md:flex-row items-center justify-center gap-10 mb-8">
              <div className="bg-slate-900 p-4 rounded-2xl shadow-inner inline-block border border-slate-700">
                 <img src={qrUrl} alt="Join QR Code" className="w-48 h-48 rounded-xl opacity-90 hover:opacity-100 transition-opacity" />
              </div>
              <div className="space-y-4 text-left">
                <div>
                  <p className="text-sm text-slate-400 uppercase font-bold tracking-wider mb-1">Room Code</p>
                  <div className="text-5xl font-black text-blue-400 tracking-widest bg-slate-900/50 py-3 px-6 rounded-2xl border border-slate-700">{roomId}</div>
                </div>
                <div className="flex items-center gap-3 bg-emerald-500/10 text-emerald-400 p-4 rounded-2xl border border-emerald-500/20">
                  <div className="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                  <span className="text-xl font-bold">{playersCount} Students Connected</span>
                </div>
              </div>
            </div>

            <div className="bg-slate-900/50 p-5 rounded-2xl border border-slate-700 mb-8 text-left space-y-4 shadow-inner">
              <h3 className="font-bold text-slate-300 border-b border-slate-700 pb-2 mb-3">⚙️ Simulation Settings</h3>
              <div className="flex items-center justify-between">
                <label className="text-slate-400 font-semibold">Avatars per Student</label>
                <input type="number" min="1" max="10" value={avatarsPerStudent} onChange={(e) => setAvatarsPerStudent(Number(e.target.value))} className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1 w-20 text-center focus:border-blue-500 outline-none" />
              </div>
              <div className="flex items-center justify-between">
                <label className="text-slate-400 font-semibold">😇 Angels (Always COOP)</label>
                <input type="number" min="0" max="50" value={numAngels} onChange={(e) => setNumAngels(Number(e.target.value))} className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1 w-20 text-center focus:border-blue-500 outline-none" />
              </div>
              <div className="flex items-center justify-between">
                <label className="text-slate-400 font-semibold">😈 Devils (Always BETRAY)</label>
                <input type="number" min="0" max="50" value={numDevils} onChange={(e) => setNumDevils(Number(e.target.value))} className="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1 w-20 text-center focus:border-blue-500 outline-none" />
              </div>
              <div className="flex items-center justify-between pt-2 border-t border-slate-700/50">
                <div className="flex flex-col">
                  <label className="text-slate-400 font-semibold">🔄 Allow Self-Collision</label>
                  <span className="text-xs text-slate-500 font-normal">Student's own avatars can match with each other</span>
                </div>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={allowSelfCollision} onChange={(e) => setAllowSelfCollision(e.target.checked)} />
                  <div className="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                </label>
              </div>
              <div className="flex items-center justify-between pt-2 border-t border-slate-700/50">
                <div className="flex flex-col">
                  <label className="text-slate-400 font-semibold">🧠 Enable Avatar Memory</label>
                  <span className="text-xs text-slate-500 font-normal">TFT remembers an opponent's last move from past encounters</span>
                </div>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={enableMemory} onChange={(e) => setEnableMemory(e.target.checked)} />
                  <div className="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                </label>
              </div>
              <div className="flex items-center justify-between pt-2 border-t border-slate-700/50">
                <div className="flex flex-col">
                  <label className="text-slate-400 font-semibold">🎭 Allow Tit-For-Tat</label>
                  <span className="text-xs text-slate-500 font-normal">Students can select the TFT strategy in their app</span>
                </div>
                <label className="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" className="sr-only peer" checked={allowTFT} onChange={(e) => setAllowTFT(e.target.checked)} />
                  <div className="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                </label>
              </div>
            </div>

            <button onClick={() => onPlay({ avatarsPerStudent, numAngels, numDevils, allowSelfCollision, enableMemory, allowTFT })} disabled={playersCount === 0} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed rounded-2xl font-bold text-2xl shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all active:scale-95">
              ▶ START SIMULATION
            </button>
          </div>
        </div>
      );
    }

    function TeacherArena({ roomId, room, players, onStop }) {
      const canvasRef = useRef(null);
      const physicsPlayers = useRef({});
      const localScores = useRef({});
      const hasInitialized = useRef(false);
      const cooldowns = useRef({});
      const effects = useRef([]);
      const matchMemory = useRef({});
      const animationRef = useRef(null);
      const [leaderboard, setLeaderboard] = useState([]);

      const playMatch = (p1, p2, settings) => {
        let p1Score = 0; let p2Score = 0; let p1Moves = []; let p2Moves = [];
        const s1 = Array.isArray(p1.strategy) ? p1.strategy : ['COOP', 'COOP', 'COOP', 'COOP', 'COOP'];
        const s2 = Array.isArray(p2.strategy) ? p2.strategy : ['COOP', 'COOP', 'COOP', 'COOP', 'COOP'];

        const pairId = [p1.physicsId, p2.physicsId].sort().join('_');
        const pastEncounter = settings.enableMemory ? matchMemory.current[pairId] : null;

        // If memory is enabled and they've met, TFT copies the opponent's final move from their last match.
        let p1TftFirst = pastEncounter ? pastEncounter[p2.physicsId] : 'COOP';
        let p2TftFirst = pastEncounter ? pastEncounter[p1.physicsId] : 'COOP';

        for (let i = 0; i < 5; i++) {
          let m1 = s1[i] || 'COOP'; let m2 = s2[i] || 'COOP';
          if (m1 === 'TFT') m1 = i === 0 ? p1TftFirst : p2Moves[i - 1];
          if (m2 === 'TFT') m2 = i === 0 ? p2TftFirst : p1Moves[i - 1];
          p1Moves.push(m1); p2Moves.push(m2);

          if (m1 === 'COOP' && m2 === 'COOP') { p1Score += 2; p2Score += 2; }
          else if (m1 === 'BETRAY' && m2 === 'BETRAY') { p1Score += 0; p2Score += 0; }
          else if (m1 === 'BETRAY' && m2 === 'COOP') { p1Score += 3; p2Score -= 1; }
          else if (m1 === 'COOP' && m2 === 'BETRAY') { p1Score -= 1; p2Score += 3; }
        }

        // Store the final moves of this match into memory for next time
        if (settings.enableMemory) {
          matchMemory.current[pairId] = {
            [p1.physicsId]: p1Moves[4],
            [p2.physicsId]: p2Moves[4]
          };
        }

        return { p1Delta: p1Score, p2Delta: p2Score };
      };

      useEffect(() => {
        const settings = room?.settings || { avatarsPerStudent: 1, numAngels: 0, numDevils: 0 };
        
        if (!hasInitialized.current) {
            // Calculate an even distribution grid for initial spawn
            const estW = window.innerWidth > 768 ? window.innerWidth - 384 : window.innerWidth; // 384 is the width of the leaderboard
            const estH = window.innerHeight;
            const totalEntities = settings.numAngels + settings.numDevils + (players.length * settings.avatarsPerStudent);
            const cols = Math.max(1, Math.ceil(Math.sqrt(totalEntities * (estW / estH))));
            const rows = Math.max(1, Math.ceil(totalEntities / cols));
            const cellW = estW / cols;
            const cellH = estH / rows;
            let spawnIndex = 0;

            const getSpawnPos = () => {
                if (totalEntities === 0) return { x: 100, y: 100 };
                const x = (spawnIndex % cols) * cellW + cellW / 2;
                const y = Math.floor(spawnIndex / cols) * cellH + cellH / 2;
                spawnIndex++;
                // Add minor random jitter so they don't form perfect mechanical lines
                return {
                    x: Math.max(20, Math.min(estW - 20, x + (Math.random() * 40 - 20))),
                    y: Math.max(20, Math.min(estH - 20, y + (Math.random() * 40 - 20)))
                };
            };

            localScores.current['angel_base'] = 0;
            for(let i=0; i<settings.numAngels; i++) {
                const pos = getSpawnPos();
                physicsPlayers.current[`angel_${i}`] = { id: 'angel_base', physicsId: `angel_${i}`, type: 'bot', name: 'Angel', emoji: '😇', strategy: ['COOP','COOP','COOP','COOP','COOP'], x: pos.x, y: pos.y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 };
            }
            localScores.current['devil_base'] = 0;
            for(let i=0; i<settings.numDevils; i++) {
                const pos = getSpawnPos();
                physicsPlayers.current[`devil_${i}`] = { id: 'devil_base', physicsId: `devil_${i}`, type: 'bot', name: 'Devil', emoji: '😈', strategy: ['BETRAY','BETRAY','BETRAY','BETRAY','BETRAY'], x: pos.x, y: pos.y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 };
            }

            // Add avatars for initial players using the grid
            players.forEach(p => {
              localScores.current[p.id] = p.totalScore || 0;
              for(let i=0; i<settings.avatarsPerStudent; i++) {
                  const pos = getSpawnPos();
                  physicsPlayers.current[`${p.id}_${i}`] = { ...p, id: p.id, physicsId: `${p.id}_${i}`, type: 'student', x: pos.x, y: pos.y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 };
              }
            });

            hasInitialized.current = true;
        } else {
            // Sync late-joiners (who arrive after the grid is already formed)
            players.forEach(p => {
              if (localScores.current[p.id] === undefined) {
                  localScores.current[p.id] = p.totalScore || 0;
                  for(let i=0; i<settings.avatarsPerStudent; i++) {
                      physicsPlayers.current[`${p.id}_${i}`] = { ...p, id: p.id, physicsId: `${p.id}_${i}`, type: 'student', x: Math.random() * 600 + 100, y: Math.random() * 400 + 100, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 };
                  }
              } else {
                  Object.values(physicsPlayers.current).forEach(physP => {
                      if (physP.id === p.id) {
                          physP.strategy = p.strategy;
                          physP.name = p.name;
                          physP.emoji = p.emoji;
                      }
                  });
              }
            });
        }
      }, [players, room?.settings]);

      // Interval to update leaderboard data smoothly without blocking the 60fps canvas loop
      useEffect(() => {
          const interval = setInterval(() => {
              const lb = [];
              const avatarsPerStudent = room?.settings?.avatarsPerStudent || 1;
              
              players.forEach(p => {
                  const total = localScores.current[p.id] !== undefined ? localScores.current[p.id] : p.totalScore;
                  lb.push({ id: p.id, name: p.name, emoji: p.emoji, strategy: p.strategy, totalScore: total, scorePerAvatar: total / avatarsPerStudent });
              });
              if (room?.settings?.numAngels > 0) {
                  const numA = room.settings.numAngels;
                  const total = localScores.current['angel_base'] || 0;
                  lb.push({ id: 'angel_base', name: 'Angel Team', emoji: '😇', strategy: ['COOP','COOP','COOP','COOP','COOP'], totalScore: total, scorePerAvatar: total / numA });
              }
              if (room?.settings?.numDevils > 0) {
                  const numD = room.settings.numDevils;
                  const total = localScores.current['devil_base'] || 0;
                  lb.push({ id: 'devil_base', name: 'Devil Team', emoji: '😈', strategy: ['BETRAY','BETRAY','BETRAY','BETRAY','BETRAY'], totalScore: total, scorePerAvatar: total / numD });
              }
              // Sort by average score per avatar instead of raw total score
              lb.sort((a,b) => b.scorePerAvatar - a.scorePerAvatar);
              setLeaderboard(lb);
          }, 500);
          return () => clearInterval(interval);
      }, [players, room?.settings]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const settings = room?.settings || { avatarsPerStudent: 1, numAngels: 0, numDevils: 0, allowSelfCollision: false, enableMemory: false };
        const handleResize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; };
        handleResize();
        window.addEventListener('resize', handleResize);

        const updateScoreInDB = async (pId, newScore) => {
          try {
            await update(ref(db, `${getPlayersPath()}/${pId}`), { totalScore: newScore });
          } catch (e) { console.error("Score update failed", e); }
        };

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const pArr = Object.values(physicsPlayers.current);

          pArr.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x <= 20 || p.x >= canvas.width - 20) p.vx *= -1;
            if (p.y <= 20 || p.y >= canvas.height - 20) p.vy *= -1;
            p.x = Math.max(20, Math.min(canvas.width - 20, p.x));
            p.y = Math.max(20, Math.min(canvas.height - 20, p.y));
            ctx.font = "14px system-ui, sans-serif"; ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; ctx.textAlign = "center";
            if (p.type === 'student') ctx.fillText(p.name, p.x, p.y - 25);
            ctx.font = "32px system-ui"; ctx.fillText(p.emoji || '😀', p.x, p.y + 10);
          });

          for (let i = 0; i < pArr.length; i++) {
            for (let j = i + 1; j < pArr.length; j++) {
              const p1 = pArr[i]; const p2 = pArr[j];
              
              if (!settings.allowSelfCollision && p1.id === p2.id) continue; // Skip collisions between avatars of the exact same student/entity unless allowed

              const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
              if (dist < 40) { 
                const pairId = [p1.physicsId, p2.physicsId].sort().join('_');
                const now = Date.now();
                if (!cooldowns.current[pairId] || now - cooldowns.current[pairId] > 3000) {
                  cooldowns.current[pairId] = now;
                  const { p1Delta, p2Delta } = playMatch(p1, p2, settings);
                  p1.vx *= -1; p1.vy *= -1; p2.vx *= -1; p2.vy *= -1;
                  effects.current.push({ x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2, text: `${p1Delta > 0 ? '+'+p1Delta : p1Delta} | ${p2Delta > 0 ? '+'+p2Delta : p2Delta}`, life: 60 });
                  
                  localScores.current[p1.id] += p1Delta;
                  localScores.current[p2.id] += p2Delta;

                  // Only sync student scores to firebase, bots exist purely locally in memory
                  if (p1.type === 'student') updateScoreInDB(p1.id, localScores.current[p1.id]);
                  if (p2.type === 'student') updateScoreInDB(p2.id, localScores.current[p2.id]);
                }
              }
            }
          }

          effects.current = effects.current.filter(e => e.life > 0);
          effects.current.forEach(e => {
            ctx.fillStyle = `rgba(56, 189, 248, ${e.life / 60})`; ctx.font = "bold 24px system-ui"; ctx.textAlign = "center"; ctx.fillText(e.text, e.x, e.y);
            ctx.beginPath(); ctx.arc(e.x, e.y, (60 - e.life) * 2, 0, Math.PI * 2); ctx.strokeStyle = `rgba(255, 255, 255, ${e.life / 120})`; ctx.lineWidth = 2; ctx.stroke();
            e.life--; e.y -= 1;
          });

          animationRef.current = requestAnimationFrame(draw);
        };
        draw();
        return () => { window.removeEventListener('resize', handleResize); cancelAnimationFrame(animationRef.current); };
      }, [players, room?.settings]);

      return (
        <div className="flex flex-col md:flex-row h-screen overflow-hidden">
          <div className="flex-grow bg-slate-900 relative">
            <canvas ref={canvasRef} className="absolute inset-0 w-full h-full block" style={{ background: 'radial-gradient(circle at center, #1e293b 0%, #0f172a 100%)' }} />
            <div className="absolute top-4 left-4 bg-slate-800/80 p-3 rounded-xl backdrop-blur-md border border-slate-700 z-10 shadow-lg">
              <p className="text-xs text-slate-400 font-bold tracking-wider">ROOM</p>
              <p className="text-2xl font-black tracking-widest text-emerald-400">{roomId}</p>
            </div>
          </div>
          <div className="w-full md:w-96 bg-slate-800 border-l border-slate-700 flex flex-col z-10 shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
            <div className="p-6 border-b border-slate-700 bg-slate-800/50">
              <h3 className="text-2xl font-bold flex items-center justify-between"><span>🏆 Leaderboard</span><span className="text-sm bg-slate-700 px-3 py-1 rounded-full">{leaderboard.length}</span></h3>
            </div>
            <div className="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
              {leaderboard.map((p, index) => (
                <div key={p.id} className={`p-4 rounded-xl flex items-center gap-4 transition-transform hover:scale-[1.02] border ${p.id.includes('base') ? 'bg-slate-800 border-indigo-500/30 shadow-inner' : 'bg-slate-700/40 border-slate-600/30'}`}>
                  <div className="text-xl font-bold text-slate-500 w-6">#{index + 1}</div>
                  <div className="text-3xl">{p.emoji}</div>
                  <div className="flex-grow min-w-0">
                    <p className="font-bold truncate text-lg">{p.name}</p>
                    <div className="flex gap-1 mt-1">
                      {p.strategy.map((s, i) => <span key={i} className={`w-3 h-3 rounded-full ${s === 'COOP' ? 'bg-blue-400' : s === 'BETRAY' ? 'bg-red-400' : 'bg-purple-400'}`}></span>)}
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="text-right">
                      <div className="text-2xl font-black font-mono text-emerald-400">{Number(p.scorePerAvatar).toFixed(1)}</div>
                      <div className="text-[10px] uppercase font-bold text-slate-400 tracking-wider mt-[-2px]">Avg/Bot</div>
                    </div>
                    <div className="text-right border-l border-slate-600 pl-3">
                      <div className="text-xl font-bold font-mono text-slate-300">{p.totalScore}</div>
                      <div className="text-[10px] uppercase font-bold text-slate-500 tracking-wider mt-[-2px]">Total</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="p-6 border-t border-slate-700 bg-slate-800/80 backdrop-blur-md">
              <button onClick={onStop} className="w-full py-4 bg-red-600/20 hover:bg-red-500/30 text-red-400 rounded-xl font-bold transition-all border border-red-500/30">🛑 Stop & Return to Lobby</button>
            </div>
          </div>
        </div>
      );
    }

    // ---------------------------------------------------------
    // STUDENT VIEWS
    // ---------------------------------------------------------
    function StudentLogin({ roomId, setRoomId, userId, onJoined, setErrorMsg }) {
      const [name, setName] = useState(''); const [emoji, setEmoji] = useState('😎'); const [loading, setLoading] = useState(false);
      const emojis = ['😎', '🤠', '👽', '👻', '🤖', '🦊', '🦖', '🦄', '🐙', '🐸'];

      const handleJoin = async (e) => {
        e.preventDefault(); if (!roomId || !name) return;
        setLoading(true);
        try {
          const joinPromise = set(ref(db, `${getPlayersPath()}/${userId}`), { roomId: roomId.toUpperCase(), name: name.trim(), emoji, totalScore: 0, strategy: ['COOP', 'COOP', 'COOP', 'COOP', 'COOP'], joinedAt: new Date().toISOString() });
          
          const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error("Connection timeout. Please check your internet connection or DB status.")), 6000)
          );

          await Promise.race([joinPromise, timeoutPromise]);
          onJoined();
        } catch (err) { 
          console.error("Join error:", err);
          setErrorMsg(err.message || "Failed to join room. Check DB rules."); 
          setLoading(false); 
        }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
          <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px]"></div>
          <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[100px]"></div>
          <div className="bg-slate-800/80 p-8 rounded-3xl shadow-2xl border border-slate-700 backdrop-blur-xl w-full max-w-md z-10">
            <h2 className="text-3xl font-extrabold mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Join Game</h2>
            <form onSubmit={handleJoin} className="space-y-6">
              <div>
                <label className="block text-sm font-bold text-slate-400 mb-2">Room Code</label>
                <input type="text" required value={roomId} onChange={(e) => setRoomId(e.target.value.toUpperCase())} className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-2xl text-center font-bold tracking-widest focus:outline-none focus:border-blue-500 uppercase" placeholder="XXXXX" maxLength={6} />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-400 mb-2">Your Name</label>
                <input type="text" required value={name} onChange={(e) => setName(e.target.value)} className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-blue-500" placeholder="Student Name" maxLength={15} />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-400 mb-3">Choose Avatar</label>
                <div className="grid grid-cols-5 gap-3">
                  {emojis.map(em => <button key={em} type="button" onClick={() => setEmoji(em)} className={`text-3xl p-2 rounded-xl transition-all ${emoji === em ? 'bg-blue-500/40 scale-110 border border-blue-400' : 'bg-slate-900/50 border border-transparent hover:bg-slate-700'}`}>{em}</button>)}
                </div>
              </div>
              <button type="submit" disabled={loading} className="w-full py-4 mt-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 rounded-xl font-bold text-xl shadow-lg transition-all active:scale-95 disabled:opacity-50">{loading ? 'Joining...' : '🚀 ENTER ARENA'}</button>
            </form>
          </div>
        </div>
      );
    }

    function StudentStrategy({ userId, roomId, roomStatus, roomSettings, player, setErrorMsg }) {
      const allowTFT = roomSettings?.allowTFT ?? true;
      const [localStrategy, setLocalStrategy] = useState(player?.strategy || ['COOP', 'COOP', 'COOP', 'COOP', 'COOP']);
      const [isUpdating, setIsUpdating] = useState(false);

      // Force UI sync if database updates
      useEffect(() => { if (player && player.strategy && !isUpdating) setLocalStrategy(player.strategy); }, [player]);

      // Sanitize out TFT instantly if the teacher disabled it while the student is in-game
      useEffect(() => {
        if (!allowTFT && localStrategy.includes('TFT')) {
          const sanitized = localStrategy.map(s => s === 'TFT' ? 'COOP' : s);
          setLocalStrategy(sanitized);
          update(ref(db, `${getPlayersPath()}/${userId}`), { strategy: sanitized }).catch(() => {});
        }
      }, [allowTFT, localStrategy, userId]);

      const updateStrategy = async (index, value) => {
        const newStrategy = [...localStrategy]; newStrategy[index] = value; setLocalStrategy(newStrategy);
        setIsUpdating(true);
        try { await update(ref(db, `${getPlayersPath()}/${userId}`), { strategy: newStrategy }); } catch (e) { setErrorMsg("Failed to sync strategy."); } finally { setIsUpdating(false); }
      };

      return (
        <div className="min-h-screen bg-slate-900 pb-20">
          <div className="sticky top-0 z-20 bg-slate-800/90 backdrop-blur-md border-b border-slate-700 p-4 shadow-md flex justify-between items-center">
            <div className="flex items-center gap-3">
              <span className="text-3xl">{player?.emoji}</span>
              <div className="leading-tight"><h3 className="font-bold text-lg">{player?.name}</h3><span className="text-xs text-slate-400 uppercase tracking-widest">Room {roomId}</span></div>
            </div>
            <div className="text-right"><div className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Total Score</div><div className="text-3xl font-black text-emerald-400 font-mono">{player?.totalScore || 0}</div></div>
          </div>
          <div className={`p-4 text-center font-bold border-b transition-colors ${roomStatus === 'playing' ? 'bg-blue-600/20 text-blue-300 border-blue-500/30' : 'bg-amber-500/10 text-amber-500 border-amber-500/20'}`}>
            {roomStatus === 'playing' ? '⚔️ Game Active! Watch the Big Screen! ⚔️' : '⏳ Waiting in Lobby. Prepare your strategy.'}
          </div>
          <div className="p-4 max-w-2xl mx-auto mt-4">
            <div className="mb-6 bg-slate-800 p-5 rounded-2xl border border-slate-700 text-sm text-slate-300 shadow-inner">
              <p className="mb-2"><strong className="text-blue-400">COOP:</strong> Friendly. Earn +10 if both coop. Risk -5 if betrayed.</p>
              <p className="mb-2"><strong className="text-red-400">BETRAY:</strong> Selfish. Earn +15 if other coops. Both get 0 if both betray.</p>
              <p><strong className="text-purple-400">TFT:</strong> Cooperates round 1, then copies opponent's previous move.</p>
            </div>
            <h2 className="text-2xl font-black mb-6 text-center text-slate-200">Set Your Strategy</h2>
            <div className="space-y-4">
              {[0, 1, 2, 3, 4].map((roundIndex) => (
                <div key={roundIndex} className="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-sm relative overflow-hidden group">
                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-slate-600"></div>
                  <h4 className="text-slate-400 font-bold mb-3 text-sm tracking-wider pl-2">MATCH ROUND {roundIndex + 1}</h4>
                  <div className={`grid ${allowTFT ? 'grid-cols-3' : 'grid-cols-2'} gap-2`}>
                    <StrategyButton active={localStrategy[roundIndex] === 'COOP'} onClick={() => updateStrategy(roundIndex, 'COOP')} color="blue" label="COOP" icon="🤝" />
                    <StrategyButton active={localStrategy[roundIndex] === 'BETRAY'} onClick={() => updateStrategy(roundIndex, 'BETRAY')} color="red" label="BETRAY" icon="🔪" />
                    {allowTFT && <StrategyButton active={localStrategy[roundIndex] === 'TFT'} onClick={() => updateStrategy(roundIndex, 'TFT')} color="purple" label="TFT" icon="🔁" />}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function StrategyButton({ active, onClick, color, label, icon }) {
      const colorClasses = {
        blue: active ? 'bg-blue-600 border-blue-400 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)] scale-105 z-10' : 'bg-slate-900/50 border-slate-700 text-slate-400 hover:bg-slate-800',
        red: active ? 'bg-red-600 border-red-400 text-white shadow-[0_0_15px_rgba(220,38,38,0.4)] scale-105 z-10' : 'bg-slate-900/50 border-slate-700 text-slate-400 hover:bg-slate-800',
        purple: active ? 'bg-purple-600 border-purple-400 text-white shadow-[0_0_15px_rgba(147,51,234,0.4)] scale-105 z-10' : 'bg-slate-900/50 border-slate-700 text-slate-400 hover:bg-slate-800'
      };
      return (
        <button onClick={onClick} className={`py-3 px-2 rounded-xl font-bold flex flex-col items-center gap-1 transition-all border ${colorClasses[color]}`}>
          <span className="text-xl">{icon}</span><span className="text-xs sm:text-sm tracking-wide">{label}</span>
        </button>
      );
    }

    // Initialize the React Application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
