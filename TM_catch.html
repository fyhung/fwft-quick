<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sky Catcher (Left/Right)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #202124; /* 深色背景更像太空 */
            color: white;
            margin: 0;
            overflow: hidden;
        }

        /* --- 1. 遊戲區域 --- */
        #game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
        }

        canvas {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        /* --- 2. 啟動選單 --- */
        #setup-panel {
            background: white;
            color: #202124;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            width: 420px;
        }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-weight: 500; display: block; margin-bottom: 8px; color: #3c4043; }
        input, select { 
            width: 100%; padding: 12px; 
            border: 1px solid #dadce0; border-radius: 6px; 
            box-sizing: border-box; font-size: 14px;
        }
        button#start-btn {
            background-color: #1a73e8; color: white;
            padding: 12px 24px; border: none; border-radius: 24px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            width: 100%; transition: background 0.2s;
        }
        button#start-btn:hover { background-color: #1557b0; }
        button:disabled { background-color: #dadce0; color: #80868b; cursor: default; }

        /* --- 3. Teachable Machine 介面 (左上) --- */
        #tm-interface {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 280px;
            background: white;
            color: #202124;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
            display: none;
        }

        .tm-header {
            padding: 12px 16px;
            border-bottom: 1px solid #e8eaed;
            font-size: 14px; font-weight: 500; color: #5f6368;
            display: flex; justify-content: space-between; align-items: center;
        }

        .tm-body { padding: 16px; }

        .webcam-box {
            width: 100%; height: 180px;
            background: #f8f9fa; border-radius: 4px;
            overflow: hidden; margin-bottom: 15px;
            display: flex; justify-content: center; align-items: center;
        }
        
        .webcam-box canvas { width: 100%; height: 100%; object-fit: cover; }

        /* 條狀圖樣式 */
        .class-row { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; }
        .class-name { width: 60px; text-align: right; margin-right: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-bg { flex-grow: 1; height: 18px; background: #f1f3f4; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.1s; }
        .class-percent { width: 35px; text-align: right; font-size: 11px; color: #5f6368; margin-left: 5px; }

        .hint {
            margin-top: 12px; font-size: 12px; color: #d93025; text-align: center;
            background: #fce8e6; padding: 6px; border-radius: 4px;
        }
        
        /* 箭頭指示器 (Visual Feedback) */
        #direction-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; color: rgba(255,255,255,0.2); pointer-events: none;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div id="setup-panel">
        <h2 style="margin-top:0;">🌌 AI Sky Catcher</h2>
        <p style="color:#5f6368; font-size: 0.9em; margin-bottom: 20px;">
            請貼上包含 <b>"Left"</b> 與 <b>"Right"</b> 類別的模型連結。
        </p>
        
        <div class="input-group">
            <label>模型類型 (Project Type)</label>
            <select id="model-type">
                <option value="pose">Pose Project (姿態 - 推薦)</option>
                <option value="image">Image Project (圖像)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Teachable Machine 連結</label>
            <input type="text" id="model-url" placeholder="https://teachablemachine.withgoogle.com/models/..." />
        </div>
        <button id="start-btn" onclick="init()">🚀 啟動遊戲</button>
        <p id="status-msg" style="margin-top: 15px; color: #d93025; font-size: 13px;"></p>
    </div>

    <div id="tm-interface">
        <div class="tm-header">
            <span>Live Preview</span>
            <span style="font-size:10px; background:#e8f0fe; color:#1967d2; padding:2px 6px; border-radius:4px;">CAM ON</span>
        </div>
        <div class="tm-body">
            <div class="webcam-box" id="webcam-container"></div>
            <div style="font-size:12px; font-weight:bold; color:#5f6368; margin-bottom:5px;">Confidence</div>
            <div id="class-list"></div>
            <div class="hint">需偵測到 "Left" 或 "Right"</div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="direction-indicator"></div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div style="margin-top: 15px; text-align: center;">
            <h2 id="score-display" style="margin:0; font-size: 2em;">Score: 0</h2>
            <p style="color: #aaa; font-size: 14px;">(用身體左右移動來控制籃子)</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        // --- 1. 遊戲參數 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let score = 0;
        
        // 玩家 (籃子)
        let player = { x: 275, y: 340, w: 60, h: 40, color: '#4cc9f0', vx: 0 };
        const FRICTION = 0.85; // 摩擦力 (讓滑動更自然)
        const SPEED = 8;       // 移動速度

        // 掉落物
        let items = [];
        let particles = []; // 爆炸特效
        let spawnTimer = 0;

        // --- 2. 遊戲邏輯 ---
        function resetGame() {
            gameRunning = true;
            score = 0;
            items = [];
            particles = [];
            player.x = canvas.width / 2 - player.w / 2;
            document.getElementById('score-display').innerText = "Score: 0";
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameRunning) return;

            // 清除畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // A. 更新玩家位置 (物理滑動效果)
            player.x += player.vx;
            player.vx *= FRICTION; // 減速效果

            // 邊界檢查
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            // 繪製玩家 (梯形籃子)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + player.w, player.y);
            ctx.lineTo(player.x + player.w - 10, player.y + player.h);
            ctx.lineTo(player.x + 10, player.y + player.h);
            ctx.closePath();
            ctx.fill();

            // B. 生成掉落物
            spawnTimer++;
            if (spawnTimer > 40) { // 每 40 fps 生成一個
                spawnItem();
                spawnTimer = 0;
            }

            // C. 更新掉落物
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;
                item.rotation += 0.05;

                // 繪製星星或炸彈
                drawEmoji(item.x, item.y, item.type === 'good' ? '⭐' : '💣', item.size, item.rotation);

                // 碰撞判定
                if (
                    item.x < player.x + player.w + 10 &&
                    item.x + item.size > player.x - 10 &&
                    item.y < player.y + player.h &&
                    item.y + item.size > player.y
                ) {
                    // 接到了！
                    if (item.type === 'good') {
                        score += 10;
                        createParticles(item.x, item.y, '#f4b400');
                        player.color = '#70e000'; // 接到時變綠一下
                        setTimeout(() => player.color = '#4cc9f0', 150);
                    } else {
                        score -= 20;
                        createParticles(item.x, item.y, '#d93025');
                        player.color = '#d93025'; // 炸到時變紅一下
                        setTimeout(() => player.color = '#4cc9f0', 150);
                    }
                    if (score < 0) score = 0;
                    document.getElementById('score-display').innerText = "Score: " + score;
                    items.splice(i, 1);
                    continue;
                }

                // 掉出畫面
                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            // D. 繪製特效粒子
            updateParticles();

            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            let isBomb = Math.random() < 0.2; // 20% 機率是炸彈
            items.push({
                x: Math.random() * (canvas.width - 30),
                y: -30,
                size: 30,
                speed: 3 + Math.random() * 3, // 隨機速度
                type: isBomb ? 'bad' : 'good',
                rotation: 0
            });
        }

        function drawEmoji(x, y, emoji, size, rotation) {
            ctx.save();
            ctx.translate(x + size/2, y + size/2);
            ctx.rotate(rotation);
            ctx.font = `${size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 0, 0);
            ctx.restore();
        }

        // 簡單的粒子特效
        function createParticles(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1.0, color: color
                });
            }
        }
        function updateParticles() {
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        // --- 3. AI 控制邏輯 ---
        let model, webcam, maxPredictions, modelType;
        const barColors = ["#4285f4", "#db4437", "#f4b400", "#0f9d58", "#ab47bc", "#00acc1"];

        async function init() {
            const btn = document.getElementById('start-btn');
            const urlInput = document.getElementById('model-url').value;
            modelType = document.getElementById('model-type').value;
            const statusMsg = document.getElementById('status-msg');

            if (!urlInput.startsWith("http")) {
                alert("連結無效！請確認開頭是 http");
                return;
            }

            btn.disabled = true;
            statusMsg.innerText = "正在連線到 Google 伺服器...";

            try {
                // 如果是第一次載入
                if (!model) {
                    const modelURL = urlInput + "model.json";
                    const metadataURL = urlInput + "metadata.json";

                    if (modelType === "image") {
                        model = await tmImage.load(modelURL, metadataURL);
                        webcam = new tmImage.Webcam(240, 180, true);
                    } else {
                        model = await tmPose.load(modelURL, metadataURL);
                        webcam = new tmPose.Webcam(240, 180, true);
                    }

                    maxPredictions = model.getTotalClasses();
                    await webcam.setup();
                    await webcam.play();
                    window.requestAnimationFrame(loop);

                    // 設置 UI
                    document.getElementById('webcam-container').appendChild(webcam.canvas);
                    createClassBars(model.getClassLabels());
                }

                // 切換介面
                document.getElementById('setup-panel').style.display = 'none';
                document.getElementById('tm-interface').style.display = 'block';
                
                resetGame();

            } catch (e) {
                alert("錯誤：" + e);
                btn.disabled = false;
                statusMsg.innerText = "載入失敗，請檢查連結";
                model = null; 
            }
        }

        async function loop() {
            if (webcam) {
                webcam.update();
                await predict();
                window.requestAnimationFrame(loop);
            }
        }

        async function predict() {
            if (!model) return;

            let prediction;
            if (modelType === "image") {
                prediction = await model.predict(webcam.canvas);
            } else {
                const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
                prediction = await model.predict(posenetOutput);
            }

            let activeAction = "Idle";
            let maxScore = 0;

            // 更新 UI 條狀圖
            for (let i = 0; i < maxPredictions; i++) {
                const p = prediction[i];
                const score = p.probability;
                
                // 更新 Bar
                const bar = document.getElementById(`bar-${i}`);
                const txt = document.getElementById(`percent-${i}`);
                if (bar) {
                    bar.style.width = (score * 100) + "%";
                    bar.style.opacity = score > 0.1 ? 1 : 0.3;
                    txt.innerText = Math.round(score * 100) + "%";
                }

                if (score > maxScore) {
                    maxScore = score;
                    activeAction = p.className;
                }
            }

            // 控制玩家 (門檻值 0.8)
            const indicator = document.getElementById('direction-indicator');
            
            if (maxScore > 0.8) {
                if (activeAction === "Left") {
                    player.vx = -SPEED;
                    indicator.innerText = "◀";
                } else if (activeAction === "Right") {
                    player.vx = SPEED;
                    indicator.innerText = "▶";
                } else {
                    indicator.innerText = "";
                }
            } else {
                indicator.innerText = "";
            }
        }

        function createClassBars(labels) {
            const list = document.getElementById('class-list');
            list.innerHTML = "";
            labels.forEach((label, index) => {
                const color = barColors[index % barColors.length];
                const row = document.createElement('div');
                row.className = 'class-row';
                row.innerHTML = `
                    <div class="class-name" title="${label}">${label}</div>
                    <div class="bar-bg"><div class="bar-fill" id="bar-${index}" style="background-color:${color}"></div></div>
                    <div class="class-percent" id="percent-${index}">0%</div>
                `;
                list.appendChild(row);
            });
        }
    </script>
</body>
</html>
