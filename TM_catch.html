<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sky Catcher v2.1 (Case Insensitive)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #202124;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        /* --- 1. 遊戲區域 --- */
        #game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            position: relative;
        }

        canvas {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        /* --- 2. HUD (抬頭顯示器) --- */
        #hud-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hud-item { display: flex; align-items: center; gap: 8px; }
        .hud-icon { font-size: 24px; }
        .hud-value { font-family: monospace; font-size: 24px; }
        
        #timer-val { color: #f4b400; }
        #lives-val { color: #ea4335; letter-spacing: 2px; }
        #score-val { color: #4cc9f0; }

        /* --- 3. 啟動選單 --- */
        #setup-panel {
            background: white; color: #202124;
            padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200; width: 420px;
        }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-weight: 500; display: block; margin-bottom: 8px; color: #3c4043; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #dadce0; 
            border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        button#start-btn {
            background-color: #1a73e8; color: white;
            padding: 12px 24px; border: none; border-radius: 24px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            width: 100%; transition: background 0.2s;
        }
        button#start-btn:hover { background-color: #1557b0; }
        button:disabled { background-color: #dadce0; color: #80868b; cursor: default; }

        /* --- 4. TM 介面 (左上) --- */
        #tm-interface {
            position: fixed; top: 20px; left: 20px; width: 260px;
            background: white; color: #202124;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100; display: none;
        }
        .tm-header { padding: 10px 16px; border-bottom: 1px solid #e8eaed; font-size: 14px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; color: #5f6368;}
        .tm-body { padding: 10px; }
        .webcam-box { width: 100%; height: 160px; background: #f8f9fa; border-radius: 4px; overflow: hidden; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .webcam-box canvas { width: 100%; height: 100%; object-fit: cover; }
        .class-row { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; }
        .class-name { width: 60px; text-align: right; margin-right: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-bg { flex-grow: 1; height: 12px; background: #f1f3f4; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.1s; }

        /* 遊戲結束覆蓋層 */
        #game-over-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; flex-direction: column;
            z-index: 50; backdrop-filter: blur(5px);
        }
        #game-over-title { font-size: 48px; font-weight: bold; margin-bottom: 10px; color: #ea4335; text-shadow: 2px 2px 0px #fff; }
        #game-over-msg { font-size: 24px; margin-bottom: 30px; color: #fff; }
        .restart-btn {
            background: #34a853; color: white; padding: 15px 40px;
            border: none; border-radius: 30px; font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 168, 83, 0.4);
        }

        #direction-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; color: rgba(255,255,255,0.1); pointer-events: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup-panel">
        <h2 style="margin-top:0;">🌌 AI Sky Catcher v2.1</h2>
        <p style="color:#5f6368; font-size: 0.9em; margin-bottom: 20px;">
            控制：<b>Left</b> (左移) / <b>Right</b> (右移)<br>
            <span style="color:#d93025">規則：3條命 | 限時30秒</span>
        </p>
        
        <div class="input-group">
            <label>模型類型 (Project Type)</label>
            <select id="model-type">
                <option value="pose">Pose Project (姿態 - 推薦)</option>
                <option value="image">Image Project (圖像)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Teachable Machine 連結</label>
            <input type="text" id="model-url" placeholder="https://teachablemachine.withgoogle.com/models/..." />
        </div>
        <button id="start-btn" onclick="init()">🚀 啟動遊戲</button>
        <p id="status-msg" style="margin-top: 15px; color: #d93025; font-size: 13px;"></p>
    </div>

    <div id="tm-interface">
        <div class="tm-header">
            <span>AI Input</span>
            <span style="font-size:10px; background:#e8f0fe; color:#1967d2; padding:2px 6px; border-radius:4px;">LIVE</span>
        </div>
        <div class="tm-body">
            <div class="webcam-box" id="webcam-container"></div>
            <div id="class-list"></div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="hud-bar">
            <div class="hud-item">
                <span class="hud-icon">⏳</span>
                <span class="hud-value" id="timer-val">30</span>
            </div>
            <div class="hud-item">
                <span class="hud-icon">❤️</span>
                <span class="hud-value" id="lives-val">❤️❤️❤️</span>
            </div>
            <div class="hud-item">
                <span class="hud-icon">⭐</span>
                <span class="hud-value" id="score-val">0</span>
            </div>
        </div>

        <div id="direction-indicator"></div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="game-over-overlay">
            <div id="game-over-title">GAME OVER</div>
            <div id="game-over-msg">Time's up!</div>
            <button class="restart-btn" onclick="resetGame()">再玩一次 (Replay)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <script>
        // --- 1. 遊戲參數 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let timeLeft = 30;
        let timerInterval = null;

        let player = { x: 350, y: 440, w: 80, h: 50, color: '#4cc9f0', vx: 0 };
        const FRICTION = 0.85; 
        const SPEED = 10;       

        let items = [];
        let particles = [];
        let spawnTimer = 0;

        // --- 2. 遊戲邏輯 ---
        function resetGame() {
            score = 0;
            lives = 3;
            timeLeft = 30;
            gameRunning = true;
            items = [];
            particles = [];
            player.x = canvas.width / 2 - player.w / 2;
            
            document.getElementById('score-val').innerText = score;
            document.getElementById('timer-val').innerText = timeLeft;
            updateLivesUI();
            document.getElementById('game-over-overlay').style.display = 'none';

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameRunning) return;
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                
                if (timeLeft <= 5) document.getElementById('timer-val').style.color = "#ea4335";
                else document.getElementById('timer-val').style.color = "#f4b400";

                if (timeLeft <= 0) {
                    endGame("TIME'S UP!");
                }
            }, 1000);

            requestAnimationFrame(gameLoop);
        }

        function endGame(reason) {
            gameRunning = false;
            clearInterval(timerInterval);
            document.getElementById('game-over-title').innerText = reason === "YOU DIED" ? "GAME OVER" : "TIME'S UP!";
            document.getElementById('game-over-msg').innerText = `Final Score: ${score}`;
            document.getElementById('game-over-overlay').style.display = 'flex';
        }

        function updateLivesUI() {
            let hearts = "";
            for(let i=0; i<lives; i++) hearts += "❤️";
            document.getElementById('lives-val').innerText = hearts;
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.x += player.vx;
            player.vx *= FRICTION;
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + player.w, player.y);
            ctx.lineTo(player.x + player.w - 15, player.y + player.h);
            ctx.lineTo(player.x + 15, player.y + player.h);
            ctx.closePath();
            ctx.fill();

            spawnTimer++;
            let spawnRate = 40 - Math.floor((30 - timeLeft)); 
            if (spawnRate < 15) spawnRate = 15;
            
            if (spawnTimer > spawnRate) { 
                spawnItem();
                spawnTimer = 0;
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;
                item.rotation += 0.05;

                drawEmoji(item.x, item.y, item.type === 'good' ? '⭐' : '💣', item.size, item.rotation);

                if (
                    item.x < player.x + player.w + 10 &&
                    item.x + item.size > player.x - 10 &&
                    item.y < player.y + player.h &&
                    item.y + item.size > player.y
                ) {
                    if (item.type === 'good') {
                        score += 10;
                        createParticles(item.x, item.y, '#f4b400');
                        document.getElementById('score-val').innerText = score;
                        flashPlayer('#70e000');
                    } else {
                        lives--;
                        updateLivesUI();
                        createParticles(item.x, item.y, '#ea4335');
                        flashPlayer('#ea4335');
                        
                        if (lives <= 0) {
                            endGame("YOU DIED");
                            return; 
                        }
                    }
                    items.splice(i, 1);
                    continue;
                }

                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            updateParticles();
            requestAnimationFrame(gameLoop);
        }

        function spawnItem() {
            let isBomb = Math.random() < 0.3; 
            items.push({
                x: Math.random() * (canvas.width - 40),
                y: -40,
                size: 35,
                speed: 4 + Math.random() * 3, 
                type: isBomb ? 'bad' : 'good',
                rotation: 0
            });
        }

        function flashPlayer(color) {
            player.color = color;
            setTimeout(() => player.color = '#4cc9f0', 200);
        }

        function drawEmoji(x, y, emoji, size, rotation) {
            ctx.save();
            ctx.translate(x + size/2, y + size/2);
            ctx.rotate(rotation);
            ctx.font = `${size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 0, 0);
            ctx.restore();
        }

        function createParticles(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0, color: color
                });
            }
        }
        function updateParticles() {
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.05;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        // --- 3. AI 控制邏輯 ---
        let model, webcam, maxPredictions, modelType;
        const barColors = ["#4285f4", "#db4437", "#f4b400", "#0f9d58", "#ab47bc", "#00acc1"];

        async function init() {
            const btn = document.getElementById('start-btn');
            const urlInput = document.getElementById('model-url').value;
            modelType = document.getElementById('model-type').value;
            const statusMsg = document.getElementById('status-msg');

            if (!urlInput.startsWith("http")) {
                alert("連結無效！請確認開頭是 http");
                return;
            }

            btn.disabled = true;
            statusMsg.innerText = "正在連線到 Google 伺服器...";

            try {
                if (!model) {
                    const modelURL = urlInput + "model.json";
                    const metadataURL = urlInput + "metadata.json";

                    if (modelType === "image") {
                        model = await tmImage.load(modelURL, metadataURL);
                        webcam = new tmImage.Webcam(240, 180, true);
                    } else {
                        model = await tmPose.load(modelURL, metadataURL);
                        webcam = new tmPose.Webcam(240, 180, true);
                    }

                    maxPredictions = model.getTotalClasses();
                    await webcam.setup();
                    await webcam.play();
                    window.requestAnimationFrame(loop);

                    document.getElementById('webcam-container').appendChild(webcam.canvas);
                    createClassBars(model.getClassLabels());
                }

                document.getElementById('setup-panel').style.display = 'none';
                document.getElementById('tm-interface').style.display = 'block';
                
                resetGame(); 

            } catch (e) {
                alert("錯誤：" + e);
                btn.disabled = false;
                statusMsg.innerText = "載入失敗，請檢查連結";
                model = null; 
            }
        }

        async function loop() {
            if (webcam) {
                webcam.update();
                await predict();
                window.requestAnimationFrame(loop);
            }
        }

        // ⭐ 這裡修改了判斷邏輯 ⭐
        async function predict() {
            if (!model) return;

            let prediction;
            if (modelType === "image") {
                prediction = await model.predict(webcam.canvas);
            } else {
                const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
                prediction = await model.predict(posenetOutput);
            }

            let activeAction = "Idle";
            let maxScore = 0;

            for (let i = 0; i < maxPredictions; i++) {
                const p = prediction[i];
                const score = p.probability;
                
                const bar = document.getElementById(`bar-${i}`);
                if (bar) {
                    bar.style.width = (score * 100) + "%";
                    bar.style.opacity = score > 0.1 ? 1 : 0.3;
                    bar.style.backgroundColor = barColors[i % barColors.length];
                }

                if (score > maxScore) {
                    maxScore = score;
                    activeAction = p.className;
                }
            }

            const indicator = document.getElementById('direction-indicator');
            
            // --- 關鍵修改：轉成大寫後比較 ---
            const actionUpperCase = activeAction.toUpperCase(); 

            if (maxScore > 0.8) {
                if (actionUpperCase === "LEFT") {
                    player.vx = -SPEED;
                    indicator.innerText = "◀";
                } else if (actionUpperCase === "RIGHT") {
                    player.vx = SPEED;
                    indicator.innerText = "▶";
                } else {
                    indicator.innerText = "";
                }
            } else {
                indicator.innerText = "";
            }
        }

        function createClassBars(labels) {
            const list = document.getElementById('class-list');
            list.innerHTML = "";
            labels.forEach((label, index) => {
                const row = document.createElement('div');
                row.className = 'class-row';
                row.innerHTML = `
                    <div class="class-name" title="${label}">${label}</div>
                    <div class="bar-bg"><div class="bar-fill" id="bar-${index}"></div></div>
                `;
                list.appendChild(row);
            });
        }
    </script>
</body>
</html>
